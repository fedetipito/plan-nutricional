// ─── ORDEN MANUAL (localStorage) ──────────────────────────────────────────────
function getOrder(sec){const k="foodOrder_"+sec;const s=localStorage.getItem(k);if(s)try{return JSON.parse(s)}catch(e){}return null}
function saveOrder(sec,order){localStorage.setItem("foodOrder_"+sec,JSON.stringify(order))}
function getSortedItems(sec){
  const raw=sec==="verduras"?VERDURAS_DB:ALIMENTOS_DB[sec]||[];
  if(S.sortMode==="prot")return[...raw].sort((a,b)=>b.p-a.p);
  if(S.sortMode==="kcal")return[...raw].sort((a,b)=>a.kcal-b.kcal);
  if(S.sortMode==="manual"){const order=getOrder(sec);if(!order)return raw;const map={};raw.forEach(it=>map[it.n]=it);return order.map(n=>map[n]).filter(Boolean).concat(raw.filter(it=>!order.includes(it.n)))}
  return raw;
}

// ─── UTILIDADES ───────────────────────────────────────────────────────────────
function calc(items){let p=0,f=0,c=0,k=0;items.forEach(i=>{const d=DB[i.nombre];if(!d)return;const r=i.g/100;p+=d.p*r;f+=d.f*r;c+=d.c*r;k+=d.kcal*r});return{p:+p.toFixed(1),f:+f.toFixed(1),c:+c.toFixed(1),kcal:Math.round(k)}}
function calcTDEE(p,a,e,s,ac){const b=s==="M"?10*p+6.25*a-5*e+5:10*p+6.25*a-5*e-161;const m={sedentario:1.2,ligero:1.375,moderado:1.55,activo:1.725,muyActivo:1.9};return Math.round(b*(m[ac]||1.55))}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;")}
const today=(()=>{const d=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];return d[new Date().getDay()]})();

    const m=calc(com.items),isOpen=S.openComida===com.id;

        <div style="display:flex;gap:8px;align-items:center">
          ${pill("P",m.p,C.prot)}${pill("F",m.f,C.fat)}${pill("C",m.c,C.carb)}${pill("KCAL",m.kcal,C.kcal,"")}

          <span>ALIMENTO</span><span style="text-align:right">CANT</span><span style="text-align:right;color:${C.prot}">P</span><span style="text-align:right;color:${C.fat}">F</span><span style="text-align:right;color:${C.carb}">C</span><span style="text-align:right;color:${C.kcal}">KCAL</span></div>`;
      com.items.forEach(it=>{const d=DB[it.nombre];if(!d)return;const r=it.g/100;
        h+=`<div style="display:grid;grid-template-columns:1fr 44px 32px 32px 32px 40px;padding:5px 0;border-bottom:1px solid #0a1020;align-items:center">

          <span style="text-align:right;font-size:11px;color:${C.muted};font-family:monospace">${it.g}g</span>
          <span style="text-align:right;font-size:11px;color:${C.prot};font-family:monospace">${+(d.p*r).toFixed(1)}</span>
          <span style="text-align:right;font-size:11px;color:${C.fat};font-family:monospace">${+(d.f*r).toFixed(1)}</span>
          <span style="text-align:right;font-size:11px;color:${C.carb};font-family:monospace">${+(d.c*r).toFixed(1)}</span>

function pill(l,v,c,u="g"){return `<div style="text-align:center"><div style="font-size:7px;color:${C.muted};letter-spacing:1px">${l}</div><div style="font-size:12px;font-weight:900;color:${c};font-family:monospace">${v}${u}</div></div>`}

// ─── RENDER: SEMANA ───────────────────────────────────────────────────────────
function renderSemana(){
  const DEFROST={pollo:"🍗 Pollo",camarones:"🦐 Camarones",carne:"🥩 Carne picada",lomo:"🥩 Lomo",salmon:"🐟 Salmón"};
  const getPrep=i=>{const n=SEMANA[(i+1)%7];const t=[COMIDAS.find(c=>c.id===n.c1).tag,COMIDAS.find(c=>c.id===n.c2).tag];return[...new Set(t.filter(x=>DEFROST[x]))].map(x=>DEFROST[x])};

  function mealCell(com,m,key,isT){
    const isOpen=S.openMeal===key;
    let h=`<div onclick="toggleMeal('${esc(key)}')" style="padding:10px 8px;cursor:pointer;border-radius:8px;background:${isOpen?"rgba(15,23,42,0.8)":isT?"#0a1628":"transparent"};border:${isT?"1px solid #2dd4bf22":"1px solid transparent"};transition:background 0.15s;min-width:0">
      <div style="font-size:22px;margin-bottom:4px">${com.emoji}</div>
      <div style="font-size:11px;font-weight:700;color:${C.text};line-height:1.3;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${com.nombre}</div>
      <div style="font-size:9px;font-family:monospace;color:${C.muted}">${m.kcal} kcal</div>`;
    if(isOpen){
      h+=`<div style="margin-top:8px;padding-top:6px;border-top:1px solid ${C.border}">`;
      if(com.nota) h+=`<div style="font-size:9px;color:#fcd34d;margin-bottom:4px;line-height:1.4">⚠ ${com.nota}</div>`;
      com.items.forEach(it=>{const d=DB[it.nombre];if(!d)return;h+=`<div style="display:flex;justify-content:space-between;padding:2px 0;font-size:9px;border-bottom:1px solid #080d1a"><span style="color:${C.text}">${d.emoji} ${it.nombre}</span><span style="font-family:monospace;color:${C.muted}">${it.g}g</span></div>`});
      h+=`<div style="font-size:8px;color:#166534;margin-top:4px;line-height:1.4">+ verduras (espinaca · tomate · zanahoria)</div>
        <div style="display:flex;gap:6px;margin-top:4px;font-size:8px;font-family:monospace"><span style="color:${C.prot}">${m.p}P</span><span style="color:${C.fat}">${m.f}F</span><span style="color:${C.carb}">${m.c}C</span></div></div>`;
    }
    return h+`</div>`;
  }

  let h=`<div style="font-size:10px;color:${C.muted};margin-bottom:14px;line-height:1.7">Semana fija — todas las semanas son iguales. Tocá una comida para ver el detalle.</div>
    <div style="overflow-x:auto"><div style="min-width:700px">`;
  // Header días
  h+=`<div class="grid8" style="margin-bottom:2px"><div></div>`;
  SEMANA.forEach(({dia})=>{const isT=dia===today;h+=`<div style="text-align:center;padding:8px 4px;background:${isT?"#0c2a2a":"transparent"};border:${isT?"1px solid #2dd4bf44":"1px solid transparent"};border-radius:8px"><div style="font-size:11px;font-weight:900;color:${isT?"#2dd4bf":C.text}">${dia.slice(0,3).toUpperCase()}</div>${isT?'<div style="font-size:7px;color:#2dd4bf;letter-spacing:1px;margin-top:1px">HOY</div>':""}</div>`});
  h+=`</div>`;
  // Almuerzo
  h+=`<div class="grid8" style="margin-bottom:4px;background:${C.card};border-radius:10px;padding:4px"><div style="display:flex;align-items:center;justify-content:center;font-size:8px;letter-spacing:2px;color:${C.dim};font-weight:700">ALMUERZO</div>`;
  SEMANA.forEach(({dia,c1})=>{const com=COMIDAS.find(c=>c.id===c1);h+=mealCell(com,calc(com.items),dia+"-alm",dia===today)});
  h+=`</div>`;
  // Cena
  h+=`<div class="grid8" style="margin-bottom:4px;background:${C.card};border-radius:10px;padding:4px"><div style="display:flex;align-items:center;justify-content:center;font-size:8px;letter-spacing:2px;color:${C.dim};font-weight:700">CENA</div>`;
  SEMANA.forEach(({dia,c2})=>{const com=COMIDAS.find(c=>c.id===c2);h+=mealCell(com,calc(com.items),dia+"-cena",dia===today)});
  h+=`</div>`;
  // Prep
  h+=`<div class="grid8"><div style="display:flex;align-items:center;justify-content:center;font-size:8px;letter-spacing:2px;color:${C.dim}">❄️ PREP</div>`;
  SEMANA.forEach(({dia},i)=>{const p=getPrep(i);const isT=dia===today;h+=`<div style="font-size:9px;color:${isT?"#7dd3fc":"#475569"};padding:6px 8px;line-height:1.5;text-align:center">${p.length?p.map(x=>`<div>${x}</div>`).join(""):`<span style="color:${C.dimmer}">—</span>`}</div>`});
  h+=`</div></div></div>`;
  return h;
}

// ─── RENDER: CALCULADORA ──────────────────────────────────────────────────────
function renderCalculadora(){
  const tdee=calcTDEE(S.peso,S.altura,S.edad,S.sexo,S.activ);
  const delta={perdida:-300,mantenimiento:0,ganancia:300}[S.obj]||0;
  const tKcal=tdee+delta, tProt=Math.round(S.peso*1.6), tFat=+(S.peso*0.55).toFixed(1);
  const pK=tProt*4, fK=Math.round(tFat*9), cK=tKcal-pK-fK, tCarbs=Math.round(cK/4);

  function slider(l,field,min,max,unit=""){
    return `<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;font-size:10px;color:${C.muted};margin-bottom:4px"><span>${l}</span><span style="color:${C.text};font-family:monospace;font-weight:700">${S[field]}${unit}</span></div><input type="range" min="${min}" max="${max}" value="${S[field]}" oninput="updateCalc('${field}',+this.value)"></div>`;
  }

  let h=`<div style="display:flex;flex-direction:column;gap:16px">
    <div style="background:${C.card};border-radius:10px;padding:14px">
      <div style="font-size:9px;letter-spacing:2px;color:${C.dim};margin-bottom:14px">TUS DATOS</div>
      ${slider("Peso","peso",40,130," kg")}${slider("Altura","altura",140,210," cm")}${slider("Edad","edad",15,80)}
      <div style="margin-bottom:14px"><div style="font-size:10px;color:${C.muted};margin-bottom:8px">Sexo biológico</div><div style="display:flex;gap:6px">
        ${[["M","Masculino"],["F","Femenino"]].map(([v,l])=>`<button onclick="updateCalc('sexo','${v}')" style="flex:1;padding:7px;font-size:11px;font-family:monospace;background:${S.sexo===v?C.prot:C.card2};color:${S.sexo===v?"#000":C.muted};border:1px solid ${S.sexo===v?C.prot:C.border};border-radius:6px;font-weight:700">${l}</button>`).join("")}</div></div>
      <div style="margin-bottom:14px"><div style="font-size:10px;color:${C.muted};margin-bottom:8px">Nivel de actividad</div>
        ${[["sedentario","Sedentario","Sin ejercicio"],["ligero","Ligero","1-3 días/semana"],["moderado","Moderado","3-5 días/semana"],["activo","Activo","6-7 días/semana"],["muyActivo","Muy activo","2x/día"]].map(([v,l,s])=>`<button onclick="updateCalc('activ','${v}')" style="width:100%;text-align:left;padding:7px 12px;margin-bottom:4px;font-size:10px;font-family:monospace;background:${S.activ===v?"#0c2340":C.card2};color:${S.activ===v?"#7dd3fc":C.muted};border:1px solid ${S.activ===v?"#0ea5e9":C.border};border-radius:6px">${l} <span style="color:${C.dim}">— ${s}</span></button>`).join("")}</div>
      <div><div style="font-size:10px;color:${C.muted};margin-bottom:8px">Objetivo</div><div style="display:flex;gap:5px">
        ${[["perdida","🔥 Pérdida"],["mantenimiento","⚖ Mantener"],["ganancia","💪 Ganancia"]].map(([v,l])=>`<button onclick="updateCalc('obj','${v}')" style="flex:1;padding:7px 4px;font-size:9px;font-family:monospace;background:${S.obj===v?"#f97316":C.card2};color:${S.obj===v?"#000":C.muted};border:1px solid ${S.obj===v?"#f97316":C.border};border-radius:6px;font-weight:${S.obj===v?700:400}">${l}</button>`).join("")}</div></div>
    </div>`;

  // Results
  h+=`<div style="background:#0a1628;border:1px solid ${C.prot}22;border-radius:10px;padding:16px">
    <div style="font-size:9px;letter-spacing:2px;color:${C.dim};margin-bottom:14px">MACROS CALCULADOS</div>
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid ${C.border}">
      <div><div style="font-size:9px;color:${C.muted}">TDEE (mantenimiento)</div><div style="font-size:9px;color:${C.dim};margin-top:2px">Mifflin-St Jeor × factor actividad</div></div>
      <div style="text-align:right"><span style="font-size:24px;font-weight:900;color:${C.text};font-family:monospace">${tdee}</span><span style="font-size:11px;color:${C.muted}"> kcal</span></div></div>
    <div style="margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid ${C.border}"><div style="display:flex;justify-content:space-between;align-items:baseline">
      <span style="font-size:9px;color:${C.muted}">CALORÍAS OBJETIVO (${delta>0?"+":""}${delta})</span>
      <div><span style="font-size:22px;font-weight:900;color:#fbbf24;font-family:monospace">${tKcal}</span><span style="font-size:10px;color:${C.muted}"> kcal</span></div></div></div>`;
  [{l:"PROTEÍNA",v:tProt,c:C.prot,d:`${S.peso}kg × 1.6 = ${tProt}g → ${pK} kcal`},
   {l:"GRASA",v:tFat,c:C.fat,d:`${S.peso}kg × 0.55 → ${fK} kcal`},
   {l:"CARBOHIDRATOS",v:tCarbs,c:C.carb,d:`${tKcal}−${pK}−${fK} = ${cK} kcal ÷ 4`}
  ].forEach(({l,v,c,d})=>{h+=`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:baseline"><span style="font-size:9px;color:${C.muted};letter-spacing:1px">${l}</span><div><span style="font-size:20px;font-weight:900;color:${c};font-family:monospace">${v}</span><span style="font-size:10px;color:${C.dim}">g</span></div></div><div style="font-size:9px;color:${C.dimmer};margin-top:2px">${d}</div><div style="height:3px;background:${C.border};border-radius:2px;margin-top:4px"><div style="height:100%;width:${Math.min(100,v/3)}%;background:${c};border-radius:2px"></div></div></div>`});
  h+=`<div style="margin-top:14px;background:${C.card};border-radius:8px;padding:10px 12px"><div style="font-size:9px;color:${C.dim};letter-spacing:1px;margin-bottom:8px">POR COMIDA (÷ 2)</div><div style="display:flex;gap:16px">${pill("PROT",Math.round(tProt/2),C.prot)}${pill("GRASA",+(tFat/2).toFixed(1),C.fat)}${pill("CARBOS",Math.round(tCarbs/2),C.carb)}${pill("KCAL",Math.round(tKcal/2),C.kcal,"")}</div></div></div></div>`;
  return h;
}

// ─── RENDER PRINCIPAL ─────────────────────────────────────────────────────────
function render(){
  const content={comidas:renderComidas,semana:renderSemana,alimentos:renderAlimentos,calculadora:renderCalculadora};
  document.getElementById("root").innerHTML=`<div class="wrap">${renderHeader()}${(content[S.tab]||renderSemana)()}</div>`;
}

// ─── ACCIONES GLOBALES ────────────────────────────────────────────────────────
window.setTab=t=>{S.tab=t;S.openComida=null;S.openMeal=null;render()};
window.toggleComida=id=>{S.openComida=S.openComida===id?null:id;render()};
window.toggleMeal=k=>{S.openMeal=S.openMeal===k?null:k;render()};
window.setSec=s=>{S.sec=s;render()};
window.toggleFood=n=>{if(S.selected[n])delete S.selected[n];else S.selected[n]=true;render()};
window.clearSel=()=>{S.selected={};render()};
window.copyList=()=>{const t=Object.keys(S.selected).join("\n");const ta=document.createElement("textarea");ta.value=t;ta.style.cssText="position:fixed;left:-9999px;top:0";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);S.copied=true;render();setTimeout(()=>{S.copied=false;render()},2000)};
window.updateCalc=(f,v)=>{S[f]=v;render()};
window.setSort=m=>{S.sortMode=m;render()};
// Drag and drop
let _dragged=null;
window.dStart=(e,n)=>{_dragged=n;e.dataTransfer.effectAllowed="move";requestAnimationFrame(()=>{const el=document.querySelector(`[data-food="${CSS.escape(n)}"]`);if(el)el.classList.add("dragging")})};
window.dOver=(e)=>{e.preventDefault();e.dataTransfer.dropEffect="move";const row=e.target.closest("[data-food]");document.querySelectorAll("[data-food]").forEach(r=>r.classList.remove("drag-over"));if(row&&row.dataset.food!==_dragged)row.classList.add("drag-over")};
window.dDrop=(e,target)=>{e.preventDefault();document.querySelectorAll("[data-food]").forEach(r=>r.classList.remove("drag-over"));if(!_dragged||_dragged===target)return;const items=getSortedItems(S.sec);const order=items.map(i=>i.n);const fi=order.indexOf(_dragged),ti=order.indexOf(target);if(fi<0||ti<0)return;order.splice(fi,1);order.splice(ti,0,_dragged);saveOrder(S.sec,order);_dragged=null;render()};
window.dEnd=()=>{_dragged=null;document.querySelectorAll(".dragging").forEach(r=>r.classList.remove("dragging"))};

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
